name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  lint-and-test:
    name: Lint and test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install \
            langchain langchain-anthropic langchain-core langgraph anthropic \
            biopython httpx fastapi uvicorn \
            "pydantic>=2.7" "pydantic-settings>=2.3" \
            structlog tenacity python-dotenv nest-asyncio \
            pytest pytest-asyncio pytest-cov respx ruff

      - name: Lint with ruff
        run: ruff check agent/ api/ tests/

      - name: Run tests
        env:
          ANTHROPIC_API_KEY: test-key-not-used-llm-is-mocked
          PIPELINE_API_BASE: http://localhost:8000
        run: |
          pytest tests/ -v --tb=short \
            --cov=agent --cov=api \
            --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage
          path: coverage.xml
          if-no-files-found: ignore


  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bioagent:ci .

      - name: Smoke test: import succeeds
        run: |
          docker run --rm \
            -e ANTHROPIC_API_KEY="test-key" \
            -e PIPELINE_API_BASE="http://localhost:8000" \
            --entrypoint python \
            bioagent:ci \
            -c "from api.main import app; print('Import OK')"
